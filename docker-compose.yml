services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:3000"
    environment:
      - PORT=3000
      - MESSAGE="Running via Docker Compose!"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3